<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Noto Serif KR', serif;
background:#fff;
color:#1d1d1f;
line-height:1.8;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.hero img{
width:100%;
max-width:500px;
border-radius:24px;
}

.hero h1{
margin-top:40px;
font-size:2rem;
font-weight:400;
}

.hero p{
margin-top:10px;
color:#86868b;
}

.section{
padding:100px 30px;
max-width:700px;
margin:auto;
text-align:center;
}

.section h2{
font-size:1.8rem;
margin-bottom:30px;
font-weight:400;
}

.section p{
font-size:1rem;
color:#555;
}

.account{
margin-top:40px;
}

.copy-btn{
margin-top:10px;
padding:12px 24px;
border:none;
border-radius:999px;
background:#1d1d1f;
color:#fff;
cursor:pointer;
}

.footer{
padding:100px 20px;
text-align:center;
color:#888;
}

</style>

</head>

<body>

<section class="hero">

<img src="main.jpg">

<h1>김민수 ♥ 박지은</h1>

<p>2026.10.17 SAT</p>

</section>

<section class="section">

<h2>Invitation</h2>

<p>

서로 다른 길을 걸어온 두 사람이

같은 방향을 바라보며

평생의 동반자가 되고자 합니다.

소중한 분들을 모시고

새로운 시작의 순간을 함께하고 싶습니다.

</p>

</section>

<section class="section">

<h2>Wedding Day</h2>

<p>

2026년 10월 17일 토요일

오후 1시

그랜드컨벤션 3층

</p>

</section>

<section class="section account">

<h2>마음 전하실 곳</h2>

<p>국민은행 123456789</p>

<button class="copy-btn"
onclick="copyAccount()">

계좌번호 복사

</button>

</section>

<section class="footer">

감사합니다

</section>

<script>

function copyAccount(){

navigator.clipboard.writeText(
'123456789'
);

alert('복사되었습니다.');

}

</script>

</body>
</html>
