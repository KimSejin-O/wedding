<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>모바일 청첩장</title>

<style>

body{
    margin:0;
    font-family:'Noto Sans KR',sans-serif;
    text-align:center;
    background:#fff;
    color:#333;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.hero img{
    width:90%;
    max-width:500px;
    border-radius:20px;
}

.section{
    padding:80px 20px;
}

h1{
    font-size:2rem;
}

.copy-btn{
    padding:12px 20px;
    border:none;
    background:#222;
    color:#fff;
    border-radius:10px;
}

</style>
</head>

<body>

<section class="hero">

<img src="main.jpg">

<h1>김민수 ♥ 박지은</h1>

<p>2026.10.17 SAT</p>

</section>

<section class="section">

<h2>초대합니다</h2>

<p>
서로 다른 길을 걸어온 두 사람이<br>
같은 방향을 바라보며<br>
평생의 동반자가 되고자 합니다.
</p>

</section>

<section class="section">

<h2>예식 안내</h2>

<p>
2026년 10월 17일<br>
오후 1시
</p>

</section>

<section class="section">

<h2>마음 전하실 곳</h2>

<p>국민은행 123-456-789</p>

<button
class="copy-btn"
onclick="copyAccount()">
계좌번호 복사
</button>

</section>

<script>

function copyAccount(){

navigator.clipboard.writeText(
'123-456-789'
);

alert('복사되었습니다.');

}

</script>

</body>
</html>
